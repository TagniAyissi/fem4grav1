name: fem4grav1 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install flake8 pytest pytest-cov
      - name: Lint with flake8
        run: |
          # Stop the build if there are critical Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Install fem4grav package
        run: |
          # Install the local package in editable mode
          python -m pip install .
      - name: Test with pytest and generate coverage report
        run: |
          # Run tests located in the tests/ folder and output an XML coverage report
          if [ -d tests ]; then python -m pytest tests/ --cov=fem4grav --cov-report=xml; fi
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}